apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops
  template:
    metadata:
      labels:
        app: devsecops
    spec:
      containers:
      - name: devsecops-container
        image: devsecopsacrbest.azurecr.io/devsecops-project:v1
        ports:
        - containerPort: 5000
      imagePullSecrets:
      - name: acr-secret
